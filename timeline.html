<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き状況</title>
  <!-- LINE LIFFの公式SDK（GitHubで動かす場合はこれが必要です） -->
  <script src="https://line-scdn.net"></script>
  
  <style>
    body { background-color: #F2F4F7; font-family: sans-serif; margin: 0; padding: 0; }
    .calendar { width: 100%; max-width: 850px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
    .month-nav { display: flex; justify-content: space-between; align-items: center; font-size: 22px; margin-bottom: 12px; }
    .timeline-container { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #D0D5DD; }
    .hour-block { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
    .time-slot { flex: 1; text-align: center; padding: 12px; background: #f9f9f9; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 16px; user-select: none; }
    .time-slot:active { background: #3A7AFE; color: #fff; }
    .time-slot.booked { background: #E57373; color: #fff; cursor: not-allowed; pointer-events: none; } /* 予約済み用 */
  </style>
</head>
<body>

  <div class="calendar">
    <div class="month-nav">
      <span id="selectedDateTitle">読み込み中...</span>
    </div>
    <div class="timeline-container">
      <div id="timeline" class="timeline"></div>
    </div>
  </div>

  <script>
    // ⚠️ あなたの設定に合わせて書き換えてください
    const LIFF_ID = "2010309253-E597xFXQ";
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd0LJDcYRNuq-sJ6MoupGImtrlXkoUeD8op_orMEbjBJRyifg"; // フォームURL

    // URLのパラメータ（?date=xxx&userId=xxx）を自動で読み取る処理
    const urlParams = new URLSearchParams(window.location.search);
    const DATE_PARAM = urlParams.get('date');
    let USER_ID = urlParams.get('userId') || "GUEST_USER";

    window.addEventListener("DOMContentLoaded", async () => {
      if (DATE_PARAM) {
        const d = new Date(DATE_PARAM);
        document.getElementById("selectedDateTitle").textContent = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日の空き状況`;
      }
      
      // タイムラインの枠組みを作成
      renderTimelineSlots();

      // LINE LIFFの初期化
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          USER_ID = profile.userId;
        }
      } catch (err) {
        console.log("LIFF読み込みスキップ（ブラウザテスト用）: " + err.message);
      }
    });

    function renderTimelineSlots() {
      const times = [];
      for (let h = 9; h <= 20; h++) {
        times.push((h < 10 ? "0" + h : h) + ":00");
        times.push((h < 10 ? "0" + h : h) + ":30");
      }

      const timeline = document.getElementById("timeline");
      timeline.innerHTML = "";

      for (let i = 0; i < times.length; i += 2) {
        const hourBlock = document.createElement("div");
        hourBlock.className = "hour-block";
        hourBlock.appendChild(createSlot(times[i]));
        hourBlock.appendChild(createSlot(times[i + 1]));
        timeline.appendChild(hourBlock);
      }
    }

    function createSlot(time) {
      const slot = document.createElement("div");
      slot.className = "time-slot";
      slot.textContent = time;

      // タップしたときの処理（Googleフォームへ値を引き渡してジャンプ）
      slot.addEventListener("click", () => {
        const targetFormUrl = FORM_URL +
          "?usp=pp_url" +
          "&entry.634118256=" + encodeURIComponent(DATE_PARAM) +
          "&entry.1613633312=" + encodeURIComponent(time) +
          "&entry.951828721=" + encodeURIComponent(USER_ID); 
        
        window.location.href = targetFormUrl;
      });

      return slot;
    }
  </script>
</body>
</html>
