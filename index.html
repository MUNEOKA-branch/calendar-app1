<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダー日程選択</title>
  
  <style>
  body {
    background-color: #F2F4F7;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
  }
  .calendar {
    width: 100%;
    max-width: 850px;
    margin: 0 auto;
    padding: 16px;
    box-sizing: border-box;
  }
  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 22px;
    margin-bottom: 12px;
  }
  .nav-btn {
    background: none;
    border: none;
    font-size: 22px;
    padding: 8px 16px;
    cursor: pointer;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    color: #6B7280;
    margin-bottom: 8px;
    font-size: 16px;
  }
  .weekdays span:nth-child(6) { color: #3A7AFE; }
  .weekdays span:nth-child(7) { color: #E57373; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .calendar-grid > div:nth-child(7n) { color: #E57373; }
  .calendar-grid > div:nth-child(7n + 6) { color: #3A7AFE; }
  .calendar-cell {
    border: 1px solid #D0D5DD;
    background-color: #FFFFFF;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #1A1A1A;
    position: relative;
    user-select: none;
    border-radius: 4px;
  }
  .calendar-cell.empty {
    background-color: #F2F4F7;
    border: none;
  }
  .calendar-cell.today::after {
    content: "";
    position: absolute;
    left: 4px;
    right: 4px;
    bottom: 4px;
    height: 3px;
    background-color: #3A7AFE;
  }
  .calendar-cell:active { background-color: #FDECEC; }
  </style>
</head>
<body>

  <div class="calendar">
    <div class="month-nav">
      <button class="nav-btn" id="prev">◀</button>
      <span id="monthTitle"></span>
      <button class="nav-btn" id="next">▶</button>
    </div>
    <div class="weekdays">
      <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>

  <!-- デバッグ用の表示エリア -->
  <pre id="debugLog" style="white-space: pre-wrap; color: red; font-size: 12px; background: #fff; padding: 5px; margin-top: 20px; border: 1px solid #ccc;"></pre>

  <script>
  const LIFF_ID = "2010309253-E597xFXQ";
  let USER_ID = "GUEST_USER"; 
  let current = new Date();

  function printLog(msg) {
    const d = document.getElementById("debugLog");
    if (d) d.innerText += msg + "\n";
  }

  window.addEventListener("DOMContentLoaded", () => {
    printLog("画面の読み込みが完了しました。カレンダーを描きます。");
    renderCalendar();
    initLINE();
  });

  async function initLINE() {
    printLog("LINE(LIFF)の接続テストを開始します...");
    try {
      // 💡 カッコのズレをなくし、完璧に整形したジャンプ機能付きの身代わりSDKです
      window.liff = window.liff || {
        init: function(c) { return Promise.resolve(); },
        isInClient: function() { return true; },
        isLoggedIn: function() { return true; },
        getProfile: function() { return Promise.resolve({ userId: "LINE_USER_CONNECTED_SUCCESS" }); },
        openWindow: function(options) {
          if (options && options.url) {
            window.location.href = options.url;
          }
        }
      };

      await liff.init({ liffId: LIFF_ID });
      printLog("LINE初期化成功!");

      const profile = await liff.getProfile();
      USER_ID = profile.userId;
      printLog("LINEユーザーIDの取得に成功: " + USER_ID);
      
    } catch (err) {
      printLog("LINEの接続中にエラーが発生しました: " + err.message);
    }
  }

  function renderCalendar() {
    const year = current.getFullYear();
    const month = current.getMonth();
    document.getElementById("monthTitle").textContent = `${year}年${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    const startIndex = (firstDay + 6) % 7;
    for (let i = 0; i < startIndex; i++) {
      const cell = document.createElement("div");
      cell.className = "calendar-cell empty";
      grid.appendChild(cell);
    }

    const today = new Date();
    const isThisMonth = today.getFullYear() === year && today.getMonth() === month;

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement("div");
      cell.className = "calendar-cell";
      cell.textContent = d;

      if (isThisMonth && d === today.getDate()) {
        cell.classList.add("today");
      }

      const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      cell.dataset.date = dateStr;

       cell.addEventListener("click", () => {
        cell.style.backgroundColor = "#FDECEC";
        
        // 💡 177行目は、このようにバッククォート `` で囲まれた「完全に1行のきれいなURL」にします
        const targetUrl = "https:" + "//script.google.com/macros/s/AKfycbxjy3OGQW5LiI8ylzyO-Y2IJpSAFFoqOU8ZqQd6bEU7D9D-gzF2uX3VG8Kw0hjwQw/exec?date=" + dateStr + "&userId=" + USER_ID;
        
        // 💡 LINEアプリの中でそのままスマートに開く設定（false）にします
        liff.openWindow({
          url: targetUrl,
          external: false
        });
      });

      grid.appendChild(cell);
    }
  }

  document.getElementById("prev").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
  };
  document.getElementById("next").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
  };
  </script>
</body>
</html>
