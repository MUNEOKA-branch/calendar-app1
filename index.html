<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダー日程選択</title>
  
  <!-- 💡 LINE LIFFの公式SDK（最上部で確実に読み込みます） -->
  <script src="https://line-scdn.net"></script>
  
  <style>
  body {
    background-color: #F2F4F7;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
  }
  .calendar {
    width: 100%;
    max-width: 850px;
    margin: 0 auto;
    padding: 16px;
    box-sizing: border-box;
  }
  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 22px;
    margin-bottom: 12px;
  }
  .nav-btn {
    background: none;
    border: none;
    font-size: 22px;
    padding: 8px 16px;
    cursor: pointer;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    color: #6B7280;
    margin-bottom: 8px;
    font-size: 16px;
  }
  .weekdays span:nth-child(6) { color: #3A7AFE; }
  .weekdays span:nth-child(7) { color: #E57373; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .calendar-grid > div:nth-child(7n) { color: #E57373; }
  .calendar-grid > div:nth-child(7n + 6) { color: #3A7AFE; }
  .calendar-cell {
    border: 1px solid #D0D5DD;
    background-color: #FFFFFF;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #1A1A1A;
    position: relative;
    user-select: none;
    border-radius: 4px;
  }
  .calendar-cell.empty {
    background-color: #F2F4F7;
    border: none;
  }
  .calendar-cell.today::after {
    content: "";
    position: absolute;
    left: 4px;
    right: 4px;
    bottom: 4px;
    height: 3px;
    background-color: #3A7AFE;
  }
  .calendar-cell:active { background-color: #FDECEC; }
  </style>
</head>
<body>

  <div class="calendar">
    <div class="month-nav">
      <button class="nav-btn" id="prev">◀</button>
      <span id="monthTitle"></span>
      <button class="nav-btn" id="next">▶</button>
    </div>
    <div class="weekdays">
      <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </div>

  <script>
  // ⚠️ あなたの新しいLIFF IDに書き換えてください
  const LIFF_ID = "2010335869-v7gGXCYE";
  let USER_ID = "GUEST_USER"; 
  let current = new Date();

  window.addEventListener("DOMContentLoaded", () => {
    renderCalendar();
    initLINE();
  });

  async function initLINE() {
    // 💡 エラーの原因だった「window.liff = ...」の身代わり処理を完全に撤去しました！
    try {
      if (typeof liff !== "undefined" && typeof liff.init === "function") {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        USER_ID = profile.userId;
        console.log("LINEユーザーID取得成功: " + USER_ID);
      } else {
        // LINEアプリ外（PCブラウザなど）で開かれた場合の安全なフォールバック
        USER_ID = "PC_BROWSER_TEST_USER";
        console.log("LINE環境外のためテスト用IDを使用します");
      }
    } catch (err) {
      console.error("LINEの接続中にエラーが発生しました: " + err.message);
    }
  }

  function renderCalendar() {
    const year = current.getFullYear();
    const month = current.getMonth();
    document.getElementById("monthTitle").textContent = `${year}年${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    const startIndex = (firstDay + 6) % 7;
    for (let i = 0; i < startIndex; i++) {
      const cell = document.createElement("div");
      cell.className = "calendar-cell empty";
      grid.appendChild(cell);
    }

    const today = new Date();
    const isThisMonth = today.getFullYear() === year && today.getMonth() === month;

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement("div");
      cell.className = "calendar-cell";
      cell.textContent = d;

      if (isThisMonth && d === today.getDate()) {
        cell.classList.add("today");
      }

      const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      cell.dataset.date = dateStr;

      cell.addEventListener("click", () => {
        cell.style.backgroundColor = "#FDECEC";
        
        // 💡 177行目は、このようにバッククォート `` で囲まれた「完全に1行のきれいなURL」にします
        const targetUrl = "https://muneoka-branch.github.io/calendar-app1/timeline.html?date=" + dateStr + "&userId=" + USER_ID;
        
        window.location.href = targetUrl;
      });

      grid.appendChild(cell);
    }
  }

  document.getElementById("prev").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
  };
  document.getElementById("next").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
  };
  </script>
</body>
</html>
